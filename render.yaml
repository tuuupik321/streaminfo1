services:
  - type: web
    name: streamfly-bot
    runtime: python
    plan: free
    region: frankfurt
    healthCheckPath: /healthz
    buildCommand: |
      npm ci
      npm run build
      pip install --no-cache-dir -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
      - key: NODE_VERSION
        value: 22.22.0
      - key: DATABASE_URL
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: TWITCH_CLIENT_ID
        sync: false
      - key: TWITCH_SECRET
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: DONATALERTS_ACCESS_TOKEN
        sync: false
      - key: DONATALERTS_API_BASE
        value: "https://www.donationalerts.com/api/v1"
      - key: DONATIONS_WEBHOOK_SECRET
        sync: false
      - key: OWNER_TELEGRAM_ID
        sync: false
      - key: OWNER_ADMIN_PASSWORD
        sync: false
      - key: LOCAL_DEV_MODE
        value: "false"
      - key: WEBHOOK_ENABLED
        value: "true"
      - key: WEBHOOK_PATH
        value: "/telegram/webhook"
      - key: REQUIRE_INIT_DATA
        value: "true"
      - key: SELF_PING_ENABLED
        value: "false"
